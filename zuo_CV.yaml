design:
  theme: moderncv
  page:
    size: a4
    top_margin: 2cm
    bottom_margin: 2cm
    left_margin: 2cm
    right_margin: 2cm
    show_footer: true
    show_top_note: true
  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 150, 136)             # Teal
    connections: rgb(0, 150, 136)
    section_titles: rgb(0, 150, 136)
    links: rgb(156, 39, 176)           # Purple
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)
  typography:
    line_spacing: 0.6em
    alignment: justified
    date_and_location_column_alignment: right
    font_family: Roboto
    font_size:
      body: 10.5pt
      name: 25pt
      section_titles: 1.4em
    bold:
      name: false
      section_titles: true
    small_caps:
      section_titles: true
  links:
    underline: true
    show_external_link_icon: true
  header:
    alignment: left
    photo_width: 3.5cm
    space_below_name: 0.7cm
    space_below_connections: 0.7cm
    connections:
      separator: ''
      show_icons: true
      space_between_connections: 0.5cm
  section_titles:
    type: moderncv
    line_thickness: 0.15cm
    space_above: 0.55cm
    space_below: 0.3cm
  sections:
    allow_page_break: true
    space_between_regular_entries: 0.4cm
    show_time_spans_in: []
  entries:
    date_and_location_width: 4.15cm
    side_space: 0cm
    space_between_columns: 0.4cm
    allow_page_break: true
    short_second_row: false
    degree_width: 1cm
    summary:
      space_left: 0cm
    highlights:
      bullet: •
      space_left: 0cm
      space_above: 0.25cm
      space_between_items: 0.19cm
      space_between_bullet_and_text: 0.3em
  templates:
    footer: NAME - Page PAGE_NUMBER of TOTAL_PAGES
    top_note: Last updated in CURRENT_DATE
    one_line_entry:
      main_column: '**LABEL:** DETAILS'
    education_entry:
      main_column: |-
        **INSTITUTION**, DEGREE_WITH_AREA -- LOCATION
        SUMMARY
        HIGHLIGHTS
      degree_column: null
      date_and_location_column: DATE
    normal_entry:
      main_column: |-
        **NAME** -- **LOCATION**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
    experience_entry:
      main_column: |-
        **POSITION**, COMPANY -- LOCATION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
locale:
  language: english
settings:
  bold_keywords: []
