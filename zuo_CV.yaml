        highlights:
          - 'Fine-tuned SmolVLA for pick-and-place with data-scaling and vision-encoder ablations; the unfrozen encoder learned base navigation from only 10 of 130 episodes.'
          - 'Integrated PincOpen gripper, upgraded servos, and fixed an arm-extension voltage-drop failure via P-gain tuning.'
