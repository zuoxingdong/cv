          - Improved CVR and ROAS of NAVER Dynamic AD with advanced retrieval and RL models.
          - Developed RL recommendation models for LINE Wallet, boosting long-term user engagement.
          - Integrated offline RL into ranking models for Smart Message.
          - Enhanced embedding and reranker models for Brand Chatbot and GAIA Shopping.
          - Prototyped RLHF for user foundation models.
          - Co-authored a NeurIPS 2023 publication and the HyperCLOVA X Technical Report; filed a Korean patent (2025).
          - Built QueryLake ETL library and enhanced KPI reporting pipelines.
